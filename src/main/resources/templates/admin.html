
<!DOCTYPE html>

<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .sidebar { min-height: 100vh; background: #f8f9fa; border-right: 1px solid #dee2e6; }
        .sidebar .nav-link { color: #333; }
        .sidebar .nav-link.active { background-color: #0d6efd; color: white; border-radius: 4px; }
        /* DELETE MODAL */
        .custom-delete-modal {
            max-width: 500px;
        }

        .custom-delete-modal .modal-body {
            padding-top: 6px;
            padding-bottom: 6px;
        }

        .custom-delete-modal .mb-3 {
            margin-bottom: 7px !important;
        }

        .custom-delete-modal .form-label {
            margin-bottom: 3px;
        }

        .custom-delete-modal .modal-header,
        .custom-delete-modal .modal-footer {
            padding: 10px 16px;
        }


         .compact-form .mb-3 {
             margin-bottom: 0.5rem !important;
         }
        .compact-form .form-label {
            margin-bottom: 1px;
            font-size: 0.9rem;
        }
        .compact-form .form-control {
            padding: 0.25rem 0.5rem;
        }
        .compact-form .form-select {
            padding: 0.25rem 0.5rem;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand mb-0 h6">
        <strong th:text="${currentUser}"></strong> with roles:


        <span th:each="role : ${currentUserRoles}"
              th:if="${#strings.startsWith(role.authority, 'ROLE_')}"
              th:text="${#strings.replace(role.authority, 'ROLE_', '')} + ' '">
        </span>
    </span>

    <form th:action="@{/logout}" method="post" class="d-inline">

        <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
    </form>
</nav>



<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <nav class="col-md-2 sidebar py-3">
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/admin}">Admin</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/user}">User</a>
                </li>
            </ul>
        </nav>

        <!-- Main content -->
        <main class="col-md-10 py-4">
            <h2>Admin panel</h2>

            <ul class="nav nav-tabs mb-3">
                <li class="nav-item">
                    <a class="nav-link active" data-bs-toggle="tab" href="#usersTable">Users table</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-bs-toggle="tab" href="#newUser">New User</a>
                </li>
            </ul>

            <div class="tab-content">

                <!-- Tab 1: Users Table -->
                <div class="tab-pane fade show active" id="usersTable">
                    <div class="card">
                        <div class="card-body">
                            <h5>All users</h5>
                            <table class="table table-striped table-bordered">
                                <thead class="table-dark">
                                <tr>
                                    <th>ID</th>
                                    <th>First Name</th>
                                    <th>Last Name</th>
                                    <th>Age</th>
                                    <th>Email</th>
                                    <th>Role</th>
                                    <th>Edit</th>
                                    <th>Delete</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="user : ${users}">
                                    <td th:text="${user.id}"></td>
                                    <td th:text="${user.username}"></td>
                                    <td th:text="${user.lastName}"></td>
                                    <td th:text="${user.age}"></td>
                                    <td th:text="${user.email}"></td>
                                    <td>
        <span th:each="role : ${user.roles}"
              th:text="${#strings.toUpperCase(#strings.replace(role.name, 'ROLE_', ''))} + ' '">
        </span>
                                    </td>
                                    <td>
                                        <button class="btn btn-info btn-sm text-white"
                                                data-bs-toggle="modal"
                                                th:data-bs-target="'#editModal' + ${user.id}">
                                            Edit
                                        </button>
                                    </td>
                                    <td>
                                        <button class="btn btn-danger btn-sm"
                                                data-bs-toggle="modal"
                                                th:data-bs-target="'#deleteModal' + ${user.id}">
                                            Delete
                                        </button>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
                <!-- Tab 2: New User -->
                <div class="tab-pane fade" id="newUser">
                    <div class="card">

                        <div class="card-header py-1"> <!-- py-1 делает панель узкой -->
                            <h5 class="mb-0">Add new user</h5>
                        </div>


                        <div class="card-body py-2" style="max-width: 450px; margin: 0 auto;">
                            <!-- Класс compact-form применяет наши сжатые отступы -->
                            <form th:action="@{/admin/new}" method="post" class="text-center compact-form">
                                <input type="hidden" th:name="${_csrf?.parameterName}" th:value="${_csrf?.token}"/>

                                <div class="mb-3">
                                    <label class="form-label fw-bold">First name</label>
                                    <input name="username" class="form-control" placeholder="First name" required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-bold">Last name</label>
                                    <input name="lastName" class="form-control" placeholder="Last name">
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-bold">Age</label>
                                    <input name="age" type="number" class="form-control" placeholder="Age">
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-bold">Email</label>
                                    <input name="email" type="email" class="form-control" placeholder="Email" required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-bold">Password</label>
                                    <input name="password" type="password" class="form-control" placeholder="Password" required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-bold">Role</label>
                                    <select name="roleIds" multiple class="form-select" size="2">
                                        <option th:each="role : ${roles}"
                                                th:value="${role.id}"
                                                th:text="${role.name.replace('ROLE_','')}"></option>
                                    </select>
                                </div>


                                <button type="submit" class="btn btn-success px-4 mt-2">Add new user</button>
                            </form>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>
</div>

<!-- Modals (вынесены за таблицу) -->
<div th:each="user : ${users}">

    <!-- Edit Modal -->
    <div class="modal fade" th:id="'editModal' + ${user.id}" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editModalLabel">Edit user</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <form th:action="@{/admin/update}" method="post">
                    <div class="modal-body">
                        <input type="hidden" th:name="${_csrf?.parameterName}" th:value="${_csrf?.token}"/>
                        <input type="hidden" name="id" th:value="${user.id}"/>

                        <div class="mb-3">
                            <label class="form-label">First name</label>
                            <input name="username" class="form-control" th:value="${user.username}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Last name</label>
                            <input name="lastName" class="form-control" th:value="${user.lastName}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Age</label>
                            <input name="age" type="number" class="form-control" th:value="${user.age}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input name="email" type="email" class="form-control" th:value="${user.email}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input name="password" type="password" class="form-control"
                                   placeholder="Оставьте пустым чтобы не менять">
                        </div>

                        <!-- Роли -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Role</label>
                            <select name="roleIds" multiple class="form-select" size="2">
                                <option th:each="role : ${roles}"
                                        th:value="${role.id}"
                                        th:text="${#strings.toUpperCase(#strings.replace(role.name, 'ROLE_', ''))}"
                                        th:selected="${user.roles != null && #lists.contains(user.roles, role)}">
                                </option>
                            </select>
                        </div>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <!-- Delete Modal -->

    <div class="modal fade" th:id="'deleteModal' + ${user.id}" tabindex="-1" aria-labelledby="deleteModalLabel"
         aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered custom-delete-modal">
            <div class="modal-content">
                <!-- Header -->
                <div class="modal-header">
                    <h5 class="modal-title" id="deleteModalLabel">Delete user</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                    <!-- Body -->
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label fw-bold">ID</label>
                            <input type="text" class="form-control bg-light" th:value="${user.id}" readonly>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">First name</label>
                            <input type="text" class="form-control bg-light" th:value="${user.username}" readonly>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Last name</label>
                            <input type="text" class="form-control bg-light" th:value="${user.lastName}" readonly>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Age</label>
                            <input type="text" class="form-control bg-light" th:value="${user.age}" readonly>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Email</label>
                            <input type="text" class="form-control bg-light" th:value="${user.email}" readonly>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Role</label>
                            <div class="form-control bg-light" style="min-height: 38px; padding-top: 6px;">
                            <span th:each="role : ${user.roles}"
                                  class="badge bg-secondary me-1"
                                  th:text="${role.name != null ? role.name.replace('ROLE_', '') : role}">
                            </span>
                            </div>
                        </div>
                    </div>

                    <!-- Footer -->
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <form th:action="@{/admin/delete/{id}(id=${user.id})}" method="post" class="d-inline">
                            <input type="hidden" th:name="${_csrf?.parameterName}" th:value="${_csrf?.token}"/>
                            <button type="submit" class="btn btn-danger">Delete</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</div>
</body>
</html>
