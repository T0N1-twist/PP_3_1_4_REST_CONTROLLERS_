<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head}">
    <title>Admin panel</title>
    <style>
        .sidebar { min-height: 100vh; background: #f8f9fa; border-right: 1px solid #dee2e6; }
        .sidebar .nav-link { color: #333; }
        .sidebar .nav-link.active { background-color: #0d6efd; color: white; border-radius: 4px; }

        .custom-delete-modal { max-width: 490px; }
        .custom-delete-modal .modal-body { padding-top: 2px; padding-bottom: 2px; }
        .custom-delete-modal .mb-3 { margin-bottom: 4px !important; }
        .custom-delete-modal .form-label { margin-bottom: 1px; font-size: 0.88rem; }
        .custom-delete-modal .form-control { padding: 0.2rem 0.5rem; font-size: 0.9rem; }
        .custom-delete-modal .modal-header,
        .custom-delete-modal .modal-footer { padding: 6px 16px; }

        .compact-form .mb-3 { margin-bottom: 0.5rem !important; }
        .compact-form .form-label { margin-bottom: 1px; font-size: 0.9rem; }
        .compact-form .form-control,
        .compact-form .form-select { padding: 0.25rem 0.5rem; }

        .modal-dialog { max-width: 490px; }
        .modal-body .mb-3 { margin-bottom: 4px !important; }
        .modal-body .form-label { margin-bottom: 1px; font-size: 0.88rem; }
        .modal-body .form-control,
        .modal-body .form-select { padding: 0.2rem 0.5rem; font-size: 0.9rem; }
        .modal-header, .modal-footer { padding: 6px 16px; }
    </style>
</head>

<body th:replace="~{layout :: body(content = ~{::content})}">

<div th:fragment="content">

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark px-3">
        <span class="navbar-brand mb-0 h6">
            <strong id="currentUserName"></strong> with roles:
            <span id="currentUserRoles"></span>
        </span>
        <form th:action="@{/logout}" method="post" class="d-inline">
            <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
        </form>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-2 sidebar py-3">
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/admin}">Admin</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/user}">User</a>
                    </li>
                </ul>
            </nav>

            <!-- Main content -->
            <main class="col-md-10 py-4">
                <h2>Admin panel</h2>

                <ul class="nav nav-tabs mb-3" id="adminTabs">
                    <li class="nav-item">
                        <a class="nav-link active" data-bs-toggle="tab" href="#usersTable">Users table</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" data-bs-toggle="tab" href="#newUser">New User</a>
                    </li>
                </ul>

                <div class="tab-content">
                    <!-- Users Table -->
                    <div class="tab-pane fade show active" id="usersTable">
                        <div class="card">
                            <div class="card-body">
                                <h5>All users</h5>
                                <table class="table table-striped table-bordered">
                                    <thead class="table-dark">
                                    <tr>
                                        <th>ID</th>
                                        <th>First Name</th>
                                        <th>Last Name</th>
                                        <th>Age</th>
                                        <th>Email</th>
                                        <th>Role</th>
                                        <th>Edit</th>
                                        <th>Delete</th>
                                    </tr>
                                    </thead>
                                    <tbody id="usersTableBody"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <!-- New User -->
                    <div class="tab-pane fade" id="newUser">
                        <div class="card">
                            <div class="card-header py-1">
                                <h5 class="mb-0">Add new user</h5>
                            </div>
                            <div class="card-body py-2" style="max-width: 450px; margin: 0 auto;">
                                <!--
                                    Обработчик submit навешивается в admin.js через addEventListener,
                                    а НЕ через action="" — страница не перезагружается.
                                -->
                                <form id="addUserForm" class="text-center compact-form">
                                    <div class="mb-3">
                                        <label class="form-label fw-bold">First name</label>
                                        <input id="addUsername" class="form-control" placeholder="First name" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label fw-bold">Last name</label>
                                        <input id="addLastName" class="form-control" placeholder="Last name">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label fw-bold">Age</label>
                                        <input id="addAge" type="number" class="form-control" placeholder="Age">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label fw-bold">Email</label>
                                        <input id="addEmail" type="email" class="form-control" placeholder="Email" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label fw-bold">Password</label>
                                        <input id="addPassword" type="password" class="form-control" placeholder="Password" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label fw-bold">Role</label>
                                        <select id="addRoles" multiple class="form-select" size="2"></select>
                                    </div>
                                    <button type="submit" class="btn btn-success px-4 mt-2">Add new user</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Edit user</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editId">
                    <div class="mb-3"><label class="form-label">First name</label><input id="editUsername" class="form-control" required></div>
                    <div class="mb-3"><label class="form-label">Last name</label><input id="editLastName" class="form-control"></div>
                    <div class="mb-3"><label class="form-label">Age</label><input id="editAge" type="number" class="form-control"></div>
                    <div class="mb-3"><label class="form-label">Email</label><input id="editEmail" type="email" class="form-control" required></div>
                    <div class="mb-3"><label class="form-label">Password</label><input id="editPassword" type="password" class="form-control" placeholder="Оставьте пустым чтобы не менять"></div>
                    <div class="mb-3"><label class="form-label fw-bold">Role</label><select id="editRoles" multiple class="form-select" size="2"></select></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="submitEdit()">Save</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Delete Modal -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered custom-delete-modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Delete user</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="deleteId">
                    <div class="mb-3"><label class="form-label fw-bold">ID</label><input id="deleteUserId" class="form-control bg-light" readonly></div>
                    <div class="mb-3"><label class="form-label fw-bold">First name</label><input id="deleteUsername" class="form-control bg-light" readonly></div>
                    <div class="mb-3"><label class="form-label fw-bold">Last name</label><input id="deleteLastName" class="form-control bg-light" readonly></div>
                    <div class="mb-3"><label class="form-label fw-bold">Age</label><input id="deleteAge" class="form-control bg-light" readonly></div>
                    <div class="mb-3"><label class="form-label fw-bold">Email</label><input id="deleteEmail" class="form-control bg-light" readonly></div>
                    <div class="mb-3"><label class="form-label fw-bold">Role</label>
                        <div id="deleteRoles" class="form-control bg-light" style="min-height: 38px; padding-top: 6px;"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-danger" onclick="submitDelete()">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS и admin.js внутри фрагмента — иначе Thymeleaf их выбросит -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/admin.js(v=2)}"></script>

</div>
</body>
</html>
