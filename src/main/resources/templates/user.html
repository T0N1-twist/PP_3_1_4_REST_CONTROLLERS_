<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout :: head}">
    <title>User page</title>
</head>

<body th:replace="~{layout :: body(content = ~{::content})}">

<div th:fragment="content">

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark px-3">
        <span class="navbar-brand mb-0 h6">
            <strong id="currentUserName"></strong> with roles:
            <span id="currentUserRoles"></span>
        </span>
        <form th:action="@{/logout}" method="post" class="d-inline">
            <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
        </form>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 py-3"
                 style="min-height: 100vh; background: #f8f9fa; border-right: 1px solid #dee2e6;">
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin}">Admin</a></li>
                    <li class="nav-item">
                        <a class="nav-link active"
                           style="background-color: #0d6efd; color: white; border-radius: 4px;"
                           th:href="@{/user}">User</a>
                    </li>
                </ul>
            </nav>

            <main class="col-md-10 py-4">
                <h2>User information-page</h2>
                <div class="card">
                    <div class="card-body">
                        <table class="table table-striped table-bordered">
                            <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>First Name</th>
                                <th>Last Name</th>
                                <th>Age</th>
                                <th>Email</th>
                                <th>Role</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr>
                                <td id="userId">—</td>
                                <td id="userUsername">—</td>
                                <td id="userLastName">—</td>
                                <td id="userAge">—</td>
                                <td id="userEmail">—</td>
                                <td id="userRoles">—</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Bootstrap JS и user.js внутри фрагмента — иначе Thymeleaf их выбросит -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/user.js}"></script>

</div>
</body>
</html>
