<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .sidebar { min-height: 100vh; background: #f8f9fa; border-right: 1px solid #dee2e6; }
        .sidebar .nav-link { color: #333; }
        .sidebar .nav-link.active { background-color: #0d6efd; color: white; border-radius: 4px; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand mb-0 h6">
        <strong th:text="${currentUser}"></strong> with roles:
        <!-- Фильтруем список, оставляя только реальные роли -->
        <span th:each="role : ${currentUserRoles}"
              th:if="${#strings.startsWith(role.authority, 'ROLE_')}"
              th:text="${#strings.replace(role.authority, 'ROLE_', '')} + ' '">
        </span>
    </span>
    <form th:action="@{/logout}" method="post" class="d-inline">
        <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
    </form>
</nav>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <nav class="col-md-2 sidebar py-3">
            <ul class="nav flex-column">
                <!-- Проверка роли ADMIN для отображения ссылки -->
                <li class="nav-item" th:each="role : ${currentUserRoles}"
                    th:if="${role.getAuthority() == 'ROLE_ADMIN'}">
                    <a class="nav-link" th:href="@{/admin}">Admin</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/user}">User</a>
                </li>
            </ul>
        </nav>

        <!-- Main content -->
        <main class="col-md-10 py-4">
            <h2>User information-page</h2>
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0">About user</h5>
                </div>
                <div class="card-body">
                    <table class="table table-striped table-hover">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>First Name</th>
                            <th>Last Name</th>
                            <th>Age</th>
                            <th>Email</th>
                            <th>Role</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr>
                            <td th:text="${user.id}"></td>
                            <!-- Проверь, что в классе User поле называется username или name -->
                            <td th:text="${user.username}"></td>
                            <td th:text="${user.lastName}"></td>
                            <td th:text="${user.age}"></td>
                            <td th:text="${user.email}"></td>
                            <td>
                                <span th:each="role : ${user.roles}"
                                      th:text="${#strings.replace(role.name, 'ROLE_', '')} + ' '"></span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
